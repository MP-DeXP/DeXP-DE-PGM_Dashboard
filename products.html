<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마케팅 대시보드 - 상품 분석</title>

    <!-- Google Fonts: Inter & Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700&display=swap"
        rel="stylesheet">

    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- PapaParse -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <!-- Custom Styles -->
    <link rel="stylesheet" href="style.css">
</head>

<body id="page-products">
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <nav class="sidebar">
            <div class="logo-area">
                <i class="ph-fill ph-chart-polar"></i>
                <span>마케팅 분석 대시보드</span>
            </div>

            <ul class="nav-links">
                <li onclick="window.location.href='insights.html'">
                    <i class="ph ph-rocket-launch"></i>
                    <span>인사이트 스튜디오</span>
                </li>
                <li class="active" onclick="window.location.href='products.html'">
                    <i class="ph ph-tag"></i>
                    <span>상품 분석</span>
                </li>
                <li onclick="window.location.href='transitions.html'">
                    <i class="ph ph-arrows-left-right"></i>
                    <span>전환 흐름</span>
                </li>
                <li onclick="window.location.href='cart.html'">
                    <i class="ph ph-shopping-cart"></i>
                    <span>장바구니 분석</span>
                </li>
            </ul>

            <div class="user-profile"></div>
        </nav>

        <!-- Main Content Area -->
        <main class="main-content">
            <header class="top-bar">
                <h1 id="page-title">상품 분석</h1>
                <div class="controls">
                    <button class="btn-icon"><i class="ph ph-bell"></i></button>
                    <button class="btn-icon"><i class="ph ph-gear"></i></button>
                </div>
            </header>

            <div id="content-area">
                <div id="loading-indicator" class="loading hidden">
                    <div class="spinner"></div>
                    <p>상품 데이터를 불러오는 중...</p>
                </div>
            </div>
        </main>
    </div>

    <!-- App Logic -->
    <script src="app.js"></script>
</body>

</html>
